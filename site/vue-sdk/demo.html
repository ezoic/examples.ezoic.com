, or replaced as the page changes. <code data-v-32100e8d>&lt;EzoicVideo&gt;</code> and <code data-v-32100e8d>&lt;EzoicVideoEmbed&gt;</code> cover the ad-bundle video placeholder and a self-contained Open Video embed, respectively. </p><p data-v-32100e8d> One thing this demo can&#39;t fully control is whether a given ad placement actually fills. Ad platforms, including Ezoic, use signals about a page&#39;s content — how much text it has, and how that text is distributed and structured — to decide how many ad positions a page is eligible to show, independent of how many <code data-v-32100e8d>&lt;EzoicAd&gt;</code> components are mounted in the DOM. A page that is mostly short button labels and status pills, rather than substantive prose, may simply not have enough content to qualify for any ad positions under those rules. That&#39;s part of why this page includes a written section like this one: not as a placement, but so the demo carries enough real text to be a meaningful test of the SDK&#39;s behavior on a page that looks more like typical published content. </p><p data-v-32100e8d> The sections below walk through the SDK&#39;s surface area one feature at a time: zero-config display ads placed by semantic location, a placement addressed by numeric id with required fill behavior, dynamic ad units added incrementally after the initial load, simulated SPA navigation that swaps placeholders on a virtual page change, consent and runtime configuration controls, rewarded ads gated on a configured loader, and video embeds via both the ad-bundle player and the standalone Open Video embed. Each panel logs its actions to the event log at the bottom of the page so the underlying composable and component behavior is visible as it happens. </p></section>`,1),X(`section`,ws,[n[7]||=X(`h2`,null,`Display ads — zero-config locations`,-1),n[8]||=X(`p`,null,[Q(` Each `),X(`code`,null,`<EzoicAd location="…">`),Q(` passes explicit `),X(`code`,null,`sizes`),Q(`; `),X(`code`,null,`required
